serenity {
  project.name = "TicketSystem E2E — F1 Autenticación"
  take.screenshots = FOR_EACH_ACTION
  test.root = "com.ticketsystem"
  requirements.dir = "src/test/resources/features"
}

webdriver {
  driver = chrome
  autodownload = true
}

headless.mode = false

environments {
  default {
    webdriver.base.url = "http://localhost:5173"
  }
  headless {
    headless.mode = true
  }
}
